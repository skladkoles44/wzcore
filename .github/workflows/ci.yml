name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
      - name: Lint (flake8, sandbox only)
        env:
          PYTHONPATH: src
        run: |
          flake8 src/wzcore_sandbox tests
      - name: Tests (pytest)
        env:
          PYTHONPATH: src
        run: |
          pytest -q
